name: Release

# Tag a commit `vX.Y.Z` (matching the version in Cargo.toml) and push the tag to
# build the standalone exe and attach the zip to a GitHub Release. Can also be run
# manually (artifact only, no Release) via the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  package:
    runs-on: windows-latest
    permissions:
      contents: write # needed to create the Release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # Single source of truth for packaging: builds --release with +crt-static
      # and stages dist\v<version>\MusicPlayer.exe plus dist\MusicPlayer-v<ver>.zip.
      - name: Package standalone build
        shell: pwsh
        run: pwsh -File scripts/package.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-windows
          path: dist/MusicPlayer-*.zip
          if-no-files-found: error

      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MusicPlayer-*.zip
          generate_release_notes: true
